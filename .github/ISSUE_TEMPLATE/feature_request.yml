name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        
        Have an idea for a new feature? We'd love to hear it!
        
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature
      placeholder: Describe the feature here...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a practical use case for this feature